info:
  name: Withdraw Request (Auto Approve)
  type: http
  seq: 4

http:
  method: GET
  url: "{{url}}/api/v1/user/withdraw_request?value=100"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{token}}
  params:
    - name: value
      value: "100"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
