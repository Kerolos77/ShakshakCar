info:
  name: End Order (Commission Deduction)
  type: http
  seq: 17

http:
  method: GET
  url: "{{url}}/api/v1/order/end/:order_id"
  headers:
    - name: Accept
      value: application/json
    - name: Authorization
      value: Bearer {{token}}
  params:
    - name: order_id
      value: "1"
      type: path
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
