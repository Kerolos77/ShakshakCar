info:
  name: 5. Get Order Offers
  type: http
  seq: 5

http:
  method: GET
  url: "{{url}}/order/{{order_id}}/offers"
  headers:
    - name: Accept
      value: application/json
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get all offers associated with a specific order.
