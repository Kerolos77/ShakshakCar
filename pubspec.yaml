name: shakshak
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.3.2
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.10+1
  awesome_snackbar_content: any
  skeletonizer: ^2.1.0+1
  flutter_launcher_icons: ^0.13.1
  go_router: ^14.6.0
  app_links: ^6.3.2
  modal_progress_hud_nsn: ^0.5.1
  animate_do: ^3.3.4
  flutter_spinkit: ^5.2.1
  get_it: ^7.7.0
  intl_phone_field: ^3.2.0
  pinput: ^5.0.0
  expandable: ^5.0.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  dio: ^5.7.0
  dartz: ^0.10.1
  bottom_picker: ^3.2.1
  dropdown_button2: ^2.3.9
  pretty_dio_logger: ^1.3.1
  google_maps_flutter: ^2.6.1
  flutter_rating_bar: ^4.0.1
  geocode: ^1.0.3
  location: ^7.0.1
  intl: any
  webview_flutter_plus: ^0.4.19
  font_awesome_flutter: ^10.10.0
  flutter_datetime_picker_plus: ^2.2.0
  carousel_slider: ^5.1.1
  http: ^1.6.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  firebase_performance: ^0.11.1+4
  flutter_local_notifications: ^20.1.0
  audioplayers: ^6.1.1
  flutter_native_splash: ^2.4.7
  flutter_background_service: ^5.1.0
  internet_connection_checker_plus: ^2.9.1+2
  equatable: ^2.0.8
  marquee: ^2.3.0
  fl_chart: ^0.71.0
  web_socket_channel: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  intl_utils: ^2.8.13

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/models/
    - assets/fonts/
    - assets/sounds/
    - assets/svg/
    - assets/map_styles/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
flutter_intl:
  enabled: true

flutter_native_splash:
  color: "#6D28D9"
  image: assets/images/logo_dark.png
  android: true
  ios: true
  fullscreen: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_white.png"
  min_sdk_android: 21